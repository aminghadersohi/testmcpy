name: Security

# Split out of ci.yml on purpose: these jobs guard against secret leakage and
# insecure code patterns rather than functional regressions, they have a
# different failure posture (some are advisory-only), and the manual
# full-history scan below is a one-off tool a maintainer reaches for, not
# something that belongs next to the standard test matrix.
#
# Direct incident context: v0.11.7 (PR #107) fixed the runtime bug where
# unscrubbed tool output (a `echo $DD_API_KEY` result) was persisted verbatim
# to a tests/.results/*.json sidecar and committed to git. This workflow is
# the CI guardrail that would have caught that commit before merge.

on:
  pull_request:
  push:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      full_history:
        description: "Also scan the entire git history (slow; will re-surface the known pre-v0.11.7 leak)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  no-tracked-result-artifacts:
    # Belt-and-suspenders for the exact bug class behind the incident:
    # .gitignore excludes these directories, but gitignore only stops *new*
    # untracked files -- it does nothing once a file is force-added or was
    # tracked before the ignore rule existed. This step fails CI outright if
    # any file under the result/report/log directories is ever tracked.
    name: Block tracked test-result artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if result/report/log artifacts are tracked in git
        run: |
          tracked=$(git ls-files -- 'tests/.results' 'tests/.smoke_reports' 'tests/.generation_logs')
          if [ -n "$tracked" ]; then
            echo "::error::These paths hold live tool-call output (potentially unscrubbed secrets) and must never be committed:"
            echo "$tracked"
            exit 1
          fi
          echo "OK: no tracked files under tests/.results, tests/.smoke_reports, or tests/.generation_logs."

  scan-range:
    # Computes the commit range once so gitleaks and trufflehog scope
    # identically -- both scan exactly the PR diff / pushed commits, never
    # full history (that's what the two *-full-history jobs are for).
    name: Determine scan range
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.range.outputs.mode }}
      base_sha: ${{ steps.range.outputs.base_sha }}
      head_sha: ${{ steps.range.outputs.head_sha }}
    steps:
      # Needed so the force-push guard below can check commit reachability
      # with `git cat-file`, not just for downstream jobs.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine scan range
        id: range
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          zero="0000000000000000000000000000000000000000"
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "mode=range" >> "$GITHUB_OUTPUT"
            echo "base_sha=${BASE_SHA}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "push" ] && [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "$zero" ] \
               && git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            # A force-push reports a non-zero `before`, but that commit can
            # be gone from history entirely (rewritten/dropped) -- in that
            # case `git log BEFORE..AFTER` inside gitleaks/trufflehog would
            # error out, so only trust the range when `before` still resolves.
            echo "mode=range" >> "$GITHUB_OUTPUT"
            echo "base_sha=${BEFORE_SHA}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${AFTER_SHA}" >> "$GITHUB_OUTPUT"
          else
            # New branch / force-push with an unreachable base / manual run:
            # no reliable commit range, fall back to scanning only the
            # current commit (not full history).
            echo "mode=tree" >> "$GITHUB_OUTPUT"
            echo "base_sha=" >> "$GITHUB_OUTPUT"
            echo "head_sha=${CURRENT_SHA}" >> "$GITHUB_OUTPUT"
          fi

  gitleaks:
    # Scans the PR diff (pull_request) or the pushed commit range (push).
    # Deliberately does NOT scan full history here -- the repo has a known
    # pre-v0.11.7 leak in its history (see gitleaks-full-history below), and
    # blocking every PR on old history would make this check useless.
    #
    # Runs the OSS gitleaks CLI directly (Docker image pinned by digest)
    # rather than gitleaks/gitleaks-action: the action requires a
    # GITLEAKS_LICENSE for repos owned by an organization account (which
    # preset-io is), even though the underlying CLI is free and unrestricted.
    name: gitleaks secret scan
    needs: scan-range
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        env:
          # zricethezav/gitleaks:v8.29.1, pinned by digest (not a floating tag).
          GITLEAKS_IMAGE: zricethezav/gitleaks@sha256:aa036a2f4bdfe3cc3c55fa4326308efabb4a6be498c883c864fd1d0d5585438a
          MODE: ${{ needs.scan-range.outputs.mode }}
          BASE_SHA: ${{ needs.scan-range.outputs.base_sha }}
          HEAD_SHA: ${{ needs.scan-range.outputs.head_sha }}
        run: |
          mkdir -p gitleaks-report
          if [ "$MODE" = "range" ]; then
            gitleaks_args="--log-opts=${BASE_SHA}..${HEAD_SHA}"
          else
            gitleaks_args="--no-git"
          fi
          docker run --rm -v "$PWD:/repo" -w /repo "$GITLEAKS_IMAGE" \
            detect --source /repo --config /repo/.gitleaks.toml $gitleaks_args \
            --report-path /repo/gitleaks-report/report.json --redact -v

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report/report.json
          if-no-files-found: ignore
          retention-days: 7

  trufflehog:
    # Complements gitleaks with credential *verification*: for supported
    # detector types (AWS, GitHub, Slack, Postgres, ...) trufflehog calls the
    # provider's API to confirm a secret is actually live, not just
    # pattern-shaped. That lets this job fail the build only on a
    # confirmed-live secret -- the fixture/example files full of fake
    # `user:pass@host`-style credentials (already allowlisted for gitleaks
    # in .gitleaks.toml) never verify, so they show up as informational
    # "unverified" findings instead of blocking every PR.
    name: trufflehog secret scan
    needs: scan-range
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run trufflehog
        id: scan
        env:
          # trufflesecurity/trufflehog:3.95.8, pinned by digest (not a floating tag).
          TRUFFLEHOG_IMAGE: trufflesecurity/trufflehog@sha256:d52e62fe0237bf0199cb79f94593051300b0989d9aeab8b431001d9f75e469c1
          MODE: ${{ needs.scan-range.outputs.mode }}
          BASE_SHA: ${{ needs.scan-range.outputs.base_sha }}
          HEAD_SHA: ${{ needs.scan-range.outputs.head_sha }}
        run: |
          # Explicit even though GitHub Actions' bash steps already default
          # to -o pipefail: without it, a failure in the `docker run` half of
          # the pipe below would be masked by jq's own exit code.
          set -o pipefail

          if [ "$MODE" = "range" ]; then
            range_args="--since-commit=${BASE_SHA} --branch=${HEAD_SHA}"
          else
            range_args="--branch=${HEAD_SHA} --max-depth=1"
          fi
          # No `|| true` on this pipeline: trufflehog exits 0 even when it
          # finds secrets (we don't pass --fail), so a non-zero exit means
          # the scan itself broke (bad image/flags/git error) and this step
          # should fail loud rather than let the verified-count check below
          # pass on an empty, never-ran report.
          #
          # Unlike gitleaks (which supports --redact), trufflehog's JSON
          # always includes the plaintext secret -- in `Raw`/`RawV2`, and
          # for some detectors (e.g. Postgres) duplicated again inside
          # `SecretParts`/`StructuredData`. Never persist that unfiltered:
          # the raw docker output is piped straight into jq and only the
          # redacted result ever touches disk, so an un-redacted secret is
          # never written to a file this job could accidentally upload.
          docker run --rm -v "$PWD:/repo" "$TRUFFLEHOG_IMAGE" \
            git file:///repo $range_args \
            --results=verified,unverified,unknown --no-update -j \
            | jq -c 'del(.Raw, .RawV2, .SecretParts, .StructuredData)' \
            > trufflehog-report.jsonl

          verified=$(grep -c '"Verified":true' trufflehog-report.jsonl || true)
          total=$(grep -c '"DetectorName"' trufflehog-report.jsonl || true)
          echo "verified=${verified:-0}" >> "$GITHUB_OUTPUT"
          {
            echo "## trufflehog secret scan"
            echo "${total:-0} total finding(s), ${verified:-0} confirmed **verified** (live) secret(s)."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail on verified (live) secrets only
        run: |
          if [ "${{ steps.scan.outputs.verified }}" -gt 0 ]; then
            echo "::error::trufflehog confirmed ${{ steps.scan.outputs.verified }} LIVE secret(s) -- see the trufflehog-report artifact."
            exit 1
          fi
          echo "No verified (live) secrets found. Unverified/pattern-only findings (if any) are informational -- see the job summary and report artifact."

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-report
          path: trufflehog-report.jsonl
          if-no-files-found: ignore
          # Redacted (see above), but keep the exposure window short anyway
          # -- this is a public repo, and artifacts are otherwise downloadable
          # by any logged-in GitHub user for the default 90 days.
          retention-days: 7

  gitleaks-full-history:
    # Manually-dispatchable only: the repo's git history predates the
    # v0.11.7 scrubber fix and contains a known leaked-credential commit
    # (see PR #107 / CHANGELOG "0.11.7 - Security"). That history is being
    # purged separately on the security-hardening branch. This job exists so
    # a maintainer can re-run a full-history scan on demand without it ever
    # gating pull_request/push CI.
    #
    # Deliberately does NOT use continue-on-error: gitleaks' default
    # --exit-code is 1 for "leaks found" *and* for a real execution error
    # (bad config, etc.), so continue-on-error would mask both alike. Instead
    # this job passes --exit-code 0 so the *expected* outcome (the known
    # historical leak) exits cleanly, while a genuine error still surfaces --
    # docker/gitleaks fatal errors (bad flag, unreadable config, ...) return
    # a distinct non-zero code that --exit-code doesn't override.
    name: Full-history secret scan (manual, gitleaks)
    if: github.event_name == 'workflow_dispatch' && inputs.full_history
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan entire git history
        env:
          # zricethezav/gitleaks:v8.29.1, pinned by digest (not a floating tag).
          GITLEAKS_IMAGE: zricethezav/gitleaks@sha256:aa036a2f4bdfe3cc3c55fa4326308efabb4a6be498c883c864fd1d0d5585438a
        run: |
          mkdir -p gitleaks-report
          docker run --rm -v "$PWD:/repo" -w /repo "$GITLEAKS_IMAGE" \
            detect --source /repo --config /repo/.gitleaks.toml --log-opts="--all" --exit-code 0 \
            --report-path /repo/gitleaks-report/full-history.json --redact -v

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-full-history-report
          path: gitleaks-report/full-history.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Summarize known finding
        if: always()
        run: |
          {
            echo "## Full-history secret scan (gitleaks)"
            echo "This job scans the *entire* git history, unlike the pull_request/push gitleaks job which only scans the diff."
            echo "A known leak predating the v0.11.7 scrubber fix (PR #107) exists in history and is expected to be flagged here (--exit-code 0 keeps that from failing the job; a real scan error would still fail it)."
            echo "History purge is tracked separately on the security-hardening branch. This job never gates pull_request/push CI regardless (workflow_dispatch only)."
          } >> "$GITHUB_STEP_SUMMARY"

  trufflehog-full-history:
    # Same manual-only scope as gitleaks-full-history, but the point of
    # running trufflehog here specifically is verification: it answers
    # whether the known pre-v0.11.7 leaked credential is still LIVE, which a
    # pattern-only scanner can't tell you. continue-on-error keeps this from
    # ever blocking -- it's a triage tool, not a gate.
    name: Full-history secret scan (manual, trufflehog verify)
    if: github.event_name == 'workflow_dispatch' && inputs.full_history
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan entire git history with verification
        id: scan
        continue-on-error: true
        env:
          # trufflesecurity/trufflehog:3.95.8, pinned by digest (not a floating tag).
          TRUFFLEHOG_IMAGE: trufflesecurity/trufflehog@sha256:d52e62fe0237bf0199cb79f94593051300b0989d9aeab8b431001d9f75e469c1
        run: |
          # See the `trufflehog` job for why: -o pipefail so a docker
          # failure isn't masked by jq's exit code, and no `|| true` on the
          # pipeline itself (continue-on-error at the step level already
          # keeps a real failure here from blocking the workflow -- this
          # just makes it visibly fail instead of silently reporting zero
          # findings on a scan that never ran).
          set -o pipefail

          # This is the single most sensitive artifact in this workflow --
          # it's the one deliberately run to check whether the known
          # pre-v0.11.7 leaked credential is still live, so the raw secret
          # is exactly what a full-history run is likely to surface. Same as
          # the `trufflehog` job: pipe straight through jq so the unfiltered
          # value (trufflehog's JSON always includes it verbatim in
          # `Raw`/`RawV2`, and for some detectors again in
          # `SecretParts`/`StructuredData`, unlike gitleaks' --redact) is
          # never written to disk.
          docker run --rm -v "$PWD:/repo" "$TRUFFLEHOG_IMAGE" \
            git file:///repo \
            --results=verified,unverified,unknown --no-update -j \
            | jq -c 'del(.Raw, .RawV2, .SecretParts, .StructuredData)' \
            > trufflehog-full-history-report.jsonl

          verified=$(grep -c '"Verified":true' trufflehog-full-history-report.jsonl || true)
          total=$(grep -c '"DetectorName"' trufflehog-full-history-report.jsonl || true)
          {
            echo "## Full-history secret scan (trufflehog verify)"
            echo "${total:-0} total finding(s) across full git history, ${verified:-0} confirmed **verified** (still-live) secret(s)."
            if [ "${verified:-0}" -gt 0 ]; then
              echo ""
              echo "**Action needed:** rotate the confirmed-live credential(s) immediately -- see the trufflehog-full-history-report artifact for location (commit/file), independent of any history purge."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-full-history-report
          path: trufflehog-full-history-report.jsonl
          if-no-files-found: ignore
          # Redacted (see above), but keep the exposure window short anyway
          # -- this is a public repo, and artifacts are otherwise downloadable
          # by any logged-in GitHub user for the default 90 days.
          retention-days: 7

  bandit:
    # Advisory Python SAST pass over the application source only (not
    # tests/examples, which intentionally contain fake-secret literals and
    # dynamic patterns bandit tends to flag). Non-blocking: bandit's default
    # ruleset is noisy on a codebase that shells out to MCP servers and
    # spawns subprocesses by design (B404/B603-style findings), so this
    # starts as a signal for maintainers rather than a merge gate. Promote
    # specific rules to blocking once the baseline is reviewed.
    name: bandit (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install "bandit==1.8.3"

      - name: Run bandit over testmcpy/
        run: |
          bandit -r testmcpy -ll -f txt -o bandit-report.txt || true
          if [ -s bandit-report.txt ]; then
            cat bandit-report.txt >> "$GITHUB_STEP_SUMMARY"
          else
            echo "bandit did not produce a report (see step logs above for the error)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.txt
          if-no-files-found: ignore
          retention-days: 7
