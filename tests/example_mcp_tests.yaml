version: "1.0"
name: "MCP Tool Validation Test Suite"
description: "Example test cases for validating MCP tool calling with Superset operations"

# Test configuration
config:
  mcp_url: "http://localhost:5008/mcp"
  default_timeout: 30
  default_model: "llama3.1:8b"

# Test cases
tests:
  - name: "test_get_chart_data"
    prompt: "Get the data for chart with ID 123"
    expected_tools:
      - "get_chart"
    evaluators:
      - name: "was_mcp_tool_called"
        args:
          tool_name: "get_chart"
      - name: "execution_successful"
      - name: "final_answer_contains"
        args:
          expected_content: ["chart", "data"]
      - name: "within_time_limit"
        args:
          max_seconds: 10

  - name: "test_list_dashboards"
    prompt: "Show me all available dashboards"
    expected_tools:
      - "list_dashboards"
    evaluators:
      - name: "was_mcp_tool_called"
        args:
          tool_name: "list_dashboards"
      - name: "execution_successful"
      - name: "final_answer_contains"
        args:
          expected_content: "dashboard"

  - name: "test_create_simple_chart"
    prompt: "Create a bar chart showing sales by region using the sales_data dataset"
    expected_tools:
      - "create_chart"
    evaluators:
      - name: "was_superset_chart_created"
      - name: "execution_successful"
      - name: "final_answer_contains"
        args:
          expected_content: ["chart", "created", "bar"]
      - name: "within_time_limit"
        args:
          max_seconds: 30

  - name: "test_sql_query_generation"
    prompt: "Generate a SQL query to get top 10 customers by total sales from the orders table"
    evaluators:
      - name: "sql_query_valid"
      - name: "final_answer_contains"
        args:
          expected_content: ["SELECT", "FROM", "orders"]
          case_sensitive: true
      - name: "token_usage_reasonable"
        args:
          max_tokens: 1500

  - name: "test_filter_dataset"
    prompt: "Filter the sales dataset to show only data from the last 30 days"
    expected_tools:
      - "apply_filter"
    evaluators:
      - name: "was_mcp_tool_called"
      - name: "execution_successful"
      - name: "final_answer_contains"
        args:
          expected_content: ["filter", "applied", "30 days"]

  - name: "test_dashboard_with_charts"
    prompt: "Create a dashboard called 'Q4 Performance' with a line chart and pie chart"
    expected_tools:
      - "create_dashboard"
      - "create_chart"
    evaluators:
      - name: "was_mcp_tool_called"
        args:
          tool_name: "create_dashboard"
      - name: "was_superset_chart_created"
      - name: "execution_successful"
      - name: "final_answer_contains"
        args:
          expected_content: ["dashboard", "Q4 Performance", "chart"]

  - name: "test_export_dashboard"
    prompt: "Export the Sales Overview dashboard as a PDF"
    expected_tools:
      - "export_dashboard"
    evaluators:
      - name: "was_mcp_tool_called"
        args:
          tool_name: "export_dashboard"
      - name: "execution_successful"
      - name: "answer_contains_link"
      - name: "within_time_limit"
        args:
          max_seconds: 20

  - name: "test_complex_aggregation"
    prompt: "Calculate the month-over-month growth rate for revenue in 2024"
    expected_tools:
      - "run_query"
    evaluators:
      - name: "was_mcp_tool_called"
      - name: "execution_successful"
      - name: "sql_query_valid"
      - name: "final_answer_contains"
        args:
          expected_content: ["growth", "revenue", "month"]

  - name: "test_permission_check"
    prompt: "Check if user john.doe@example.com has access to the Finance dashboard"
    expected_tools:
      - "check_permissions"
    evaluators:
      - name: "was_mcp_tool_called"
        args:
          tool_name: "check_permissions"
      - name: "execution_successful"
      - name: "final_answer_contains"
        args:
          expected_content: ["permission", "access"]

  - name: "test_dataset_refresh"
    prompt: "Refresh the customer_data dataset to get the latest data"
    expected_tools:
      - "refresh_dataset"
    evaluators:
      - name: "was_mcp_tool_called"
        args:
          tool_name: "refresh_dataset"
      - name: "execution_successful"
      - name: "final_answer_contains"
        args:
          expected_content: ["refresh", "dataset", "customer_data"]
      - name: "within_time_limit"
        args:
          max_seconds: 45