name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server]"

      - name: Lint with ruff
        run: |
          ruff check testmcpy unit_tests integration_tests
          ruff format --check testmcpy unit_tests integration_tests

      - name: Type check with mypy (ratchet — fails only if error count grows)
        run: bash scripts/check_mypy_ratchet.sh

      - name: Run tests with pytest
        run: pytest unit_tests/ --cov=testmcpy --cov-report=xml --cov-report=term

      - name: Run integration tests
        run: python -m pytest integration_tests/ -v --tb=short -m "not e2e"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  mcp-prerelease-canary:
    # Early warning for the MCP stateless-spec transition (2026-07-28 RC):
    # installs mcp/fastmcp pre-releases on top of our pins and runs the
    # unit suite. Never blocks CI — a red canary means "start the
    # migration", not "this PR is broken".
    name: Canary (mcp/fastmcp pre-releases)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Install with mcp/fastmcp pre-releases
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server]"
          pip install --upgrade --pre mcp fastmcp
          pip list | grep -E "^(mcp|fastmcp) "
      - name: Run unit tests against pre-releases (signal via warnings, never red)
        run: |
          # Force-upgrading past our own pins makes `pip check` complain by
          # construction — that line is noise. The real canary signal is
          # whether the suite still passes on the next mcp/fastmcp line.
          pip check | grep -v "testmcpy .* has requirement" || true
          if pytest unit_tests/ -q; then
            echo "Canary green: unit suite passes against pre-release mcp/fastmcp" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning title=mcp pre-release canary::unit suite FAILS against pre-release mcp/fastmcp — start the stateless-spec migration (see plan risk #1)"
            echo "Canary RED: unit suite fails against pre-release mcp/fastmcp — migration needed" >> "$GITHUB_STEP_SUMMARY"
          fi

  ui:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: testmcpy/ui/package-lock.json

      - name: Install UI dependencies
        run: cd testmcpy/ui && npm ci

      - name: Build UI
        run: cd testmcpy/ui && npm run build

      - name: Test UI
        run: cd testmcpy/ui && npm test

  docker-claude-cli:
    # Guards the opt-in path that bakes the Claude Code CLI into the
    # image. The default INSTALL_CLAUDE_CLI=false
    # path is exercised implicitly by any other docker user, but the
    # opt-in path only runs when someone passes the build-arg — without
    # this job, a future break in claude.ai/install.sh on the slim
    # base (e.g. a changed binary drop location) would never be caught
    # by CI. The Dockerfile's trailing `claude --version` is a real
    # smoke check, so the build itself failing IS the assertion.
    name: Docker build (Claude CLI opt-in)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build with INSTALL_CLAUDE_CLI=true
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: testmcpy:claude-ci
          build-args: |
            INSTALL_CLAUDE_CLI=true
          # No layer cache export — this job is a periodic correctness
          # check on the install pipeline, not a build-perf optimisation.
      - name: Verify `claude` is on PATH inside the image
        run: docker run --rm testmcpy:claude-ci claude --version
      - name: Verify agentic Python deps coexist (no resolver conflict)
        # Regression guard: claude-agent-sdk and fastmcp share `mcp` as a
        # transitive dep with non-trivial version pins. A future bump on
        # either side can silently re-introduce the conflict we hit in
        # fastmcp 2.12.5 + claude-agent-sdk 0.2.95 (mcp<1.17 vs mcp>=1.23).
        # `pip check` + a real import is the simplest assertion the
        # environment is coherent.
        run: |
          docker run --rm testmcpy:claude-ci pip check
          docker run --rm testmcpy:claude-ci python -c "import claude_agent_sdk, fastmcp, mcp; print('agentic deps OK')"
      - name: Verify SDK→CLI bridge actually works (not just deps install)
        # Closes the loop between "deps install" and "agentic path
        # actually runs": this drives the SDK's own private CLI lookup
        # (`SubprocessCLITransport._find_cli`) and then invokes the
        # path it returns with `--version`. Asserts (a) the SDK locates
        # a binary it considers valid, (b) the binary is on a
        # filesystem the container can actually exec, (c) it runs and
        # reports a version. Catches breakage cases the import-only
        # smoke above misses: a wheel that fails to bundle the binary
        # for this platform, a renamed entry point, or a binary that
        # can't link on python:3.11-slim's libc.
        run: |
          docker run --rm testmcpy:claude-ci python -c "
          from claude_agent_sdk._internal.transport.subprocess_cli import SubprocessCLITransport
          from claude_agent_sdk import ClaudeAgentOptions
          import subprocess
          t = SubprocessCLITransport(prompt='', options=ClaudeAgentOptions())
          cli_path = t._find_cli()
          print(f'SDK located claude CLI at: {cli_path}')
          out = subprocess.check_output([cli_path, '--version'], text=True, timeout=30)
          print(f'CLI invoked successfully: {out.strip()}')
          "

  docker-openai-agents:
    # Guards the openai-agents transitive dependency set introduced by
    # CodexSDKProvider.  openai-agents>=0.17,<0.18 forces openai>=2.36,<3
    # and pydantic>=2.12.2 — a resolver conflict against either of those
    # (or a future openai-agents bump that moves the agents.* import paths
    # we rely on) would be caught here rather than at runtime.
    name: Docker build (openai-agents dep smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build default image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: testmcpy:agents-ci
      - name: Verify no resolver conflict (pip check)
        run: docker run --rm testmcpy:agents-ci pip check
      - name: Verify openai-agents import paths exist at pinned version
        run: |
          docker run --rm testmcpy:agents-ci python -c "
          import agents
          from agents import Agent, Runner
          from agents.mcp import MCPServerStreamableHttp
          from agents.models.openai_provider import OpenAIProvider
          from agents.run_config import RunConfig
          from agents.items import ToolCallItem, ToolCallOutputItem
          print('openai-agents', agents.__version__, 'import paths OK')
          import openai, pydantic
          print('openai', openai.__version__, 'pydantic', pydantic.__version__)
          import claude_agent_sdk, fastmcp, mcp
          print('coexistence with claude-agent-sdk OK')
          "

  docker-gemini-sdk:
    # Guards the google-adk transitive dependency set introduced by
    # GeminiSDKProvider.  google-adk>=2.0.0,<3.0.0 pulls google-genai>=2.4,<3
    # and mcp>=1.24,<2 (already pinned) — a resolver conflict would be caught
    # here rather than at runtime.
    name: Docker build (google-adk dep smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build default image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: testmcpy:gadk-ci
      - name: Verify no resolver conflict (pip check)
        run: docker run --rm testmcpy:gadk-ci pip check
      - name: Verify google-adk import paths exist at pinned version
        run: |
          docker run --rm testmcpy:gadk-ci python -c "
          import google.adk
          from google.adk import Agent, Runner
          from google.adk.runners import InMemoryRunner
          from google.adk.tools.mcp_tool.mcp_toolset import McpToolset
          from google.adk.tools.mcp_tool.mcp_session_manager import StreamableHTTPConnectionParams
          from google.adk.models.google_llm import Gemini
          import google.genai
          print('google-adk', google.adk.__version__, 'import paths OK')
          print('google-genai', google.genai.__version__)
          import claude_agent_sdk, agents, fastmcp, mcp
          print('coexistence with claude-agent-sdk and openai-agents OK')
          "
