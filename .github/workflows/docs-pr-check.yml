name: Docs PR Check

on:
  pull_request:
    paths:
      - 'docs-site/**'
      - 'docs/screenshots/**'
      - 'docs/logos/**'
      - '.github/workflows/docs-pr-check.yml'
      - '.github/workflows/deploy-docs.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: docs-site

      - name: Build docs
        run: npm run build
        working-directory: docs-site
        env:
          NEXT_PUBLIC_BASE_PATH: /testmcpy

      - name: Verify static export
        run: test -f docs-site/out/index.html
