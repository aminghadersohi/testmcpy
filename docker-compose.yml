services:
  testmcpy:
    build:
      context: .
      # Opt in to baking the Claude Code CLI into the image with:
      #   INSTALL_CLAUDE_CLI=true docker compose build
      # (or `up -d --build`). Defaults to false so the published image
      # stays lean. Optionally pin a specific Claude Code version with
      #   CLAUDE_CLI_VERSION=2.1.170 — recommended for reproducibility
      # since install.sh otherwise tracks `latest`. SC-108437.
      args:
        INSTALL_CLAUDE_CLI: ${INSTALL_CLAUDE_CLI:-false}
        CLAUDE_CLI_VERSION: ${CLAUDE_CLI_VERSION:-}
    image: testmcpy:latest
    ports:
      - "${PORT:-7100}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - testmcpy-data:/app/.testmcpy
      - ./mcp_services.yaml:/app/.mcp_services.yaml:ro
      - ./llm_providers.yaml:/app/.llm_providers.yaml:ro
    environment:
      - TESTMCPY_DB_PATH=/app/.testmcpy/storage.db
      - MCP_SERVER_URL=${MCP_SERVER_URL:-http://host.docker.internal:5100/api/mcp/}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

volumes:
  testmcpy-data:
