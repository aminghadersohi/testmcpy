# Example GitHub Actions workflow for testing MCP services with testmcpy
# Copy this to .github/workflows/mcp-tests.yml in your repository

name: MCP Integration Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:
  # Optional: nightly to track flakiness over time (feeds `testmcpy matrix`)
  schedule:
    - cron: '0 2 * * *'

jobs:
  # Simplest path: the reusable action — gate, JUnit, job summary,
  # sticky PR comment, artifact upload.
  eval:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # only needed when pr_comment: true
    steps:
      - uses: actions/checkout@v4

      - uses: preset-io/testmcpy@v1
        with:
          test_path: tests/
          model: claude-haiku-4-5
          provider: anthropic
          mcp_url: ${{ vars.MCP_URL }}
          pass_threshold: '85'
          pr_comment: 'true'
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

  # Equivalent without the action — direct uvx invocation:
  eval-direct:
    runs-on: ubuntu-latest
    if: false  # enable instead of `eval` if you prefer no action dependency
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Run MCP eval suite
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MCP_URL: ${{ vars.MCP_URL }}
        run: |
          uvx testmcpy run tests/ \
            --mcp-url "$MCP_URL" \
            --model claude-haiku-4-5 --provider anthropic \
            --gate --min-pass-rate 85 \
            --junit-xml junit.xml
          # The markdown report is appended to the job summary automatically.

  # Multi-model comparison matrix (results feed `testmcpy matrix` /
  # the /performance page when runs share a results DB)
  compare-models:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        model:
          - { provider: anthropic, name: claude-haiku-4-5 }
          - { provider: anthropic, name: claude-sonnet-4-5 }
          - { provider: openai, name: gpt-4o }
    steps:
      - uses: actions/checkout@v4

      - uses: preset-io/testmcpy@v1
        with:
          test_path: tests/
          model: ${{ matrix.model.name }}
          provider: ${{ matrix.model.provider }}
          mcp_url: ${{ vars.MCP_URL }}
          pass_threshold: '0'   # comparison run — collect data, never fail
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}

# Required GitHub Secrets:
# - ANTHROPIC_API_KEY: Your Anthropic API key
# - OPENAI_API_KEY: Your OpenAI API key (if testing with GPT models)
# Required GitHub Variables:
# - MCP_URL: URL of the MCP service under test
#
# If your MCP service starts inside the workflow (same repo), add a step
# that launches it before the action and pass mcp_url: http://localhost:PORT/mcp
