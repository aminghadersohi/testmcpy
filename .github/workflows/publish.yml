name: Publish to PyPI

on:
  # Primary trigger: pushing a vX.Y.Z tag is enough — no need to also
  # create a GitHub Release. This matches the existing
  # `git tag vX.Y.Z && git push --tags` flow used after every version bump.
  push:
    tags:
      - 'v*'
  # Kept as a fallback so creating a GitHub Release (web UI / gh release
  # create) still triggers a publish if you prefer that flow.
  release:
    types: [published]

# Don't allow two publishes for the same ref to race. Idempotency on
# twine upload (--skip-existing below) means the second one is harmless,
# but we still don't want simultaneous Homebrew commits clobbering each
# other.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    # Restrict to v* tags for both event paths. The `push.tags` trigger
    # above already filters at the event level, but `release: published`
    # has no tag filter — without this guard, publishing a GitHub Release
    # for a non-version tag (e.g. a `preview` or `latest` tag) would fire
    # the workflow and the downstream `VERSION=${GITHUB_REF#refs/tags/v}`
    # parse would produce garbage. `github.ref_name` is the short tag
    # name for both push.tags and release events.
    if: startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push Homebrew formula updates

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: Build package
      run: python -m build
    
    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      # --skip-existing makes the upload idempotent. If the artifact is
      # already on PyPI (e.g. a previous run uploaded it, or a manual
      # twine push from a developer's laptop), we log "skipping" instead
      # of crashing — important now that the workflow can fire on both
      # tag pushes and GitHub Releases.
      run: python -m twine upload --skip-existing dist/*
    
    - name: Wait for PyPI to process
      run: sleep 10
    
    - name: Download from PyPI and calculate SHA256
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "Waiting for PyPI to make package available..."
        sleep 5
        curl -sL -o "testmcpy-${VERSION}.tar.gz" "https://files.pythonhosted.org/packages/source/t/testmcpy/testmcpy-${VERSION}.tar.gz" || true

        if [ -f "testmcpy-${VERSION}.tar.gz" ] && [ -s "testmcpy-${VERSION}.tar.gz" ]; then
          SHA256=$(sha256sum "testmcpy-${VERSION}.tar.gz" | awk '{print $1}')
          echo "SHA256=${SHA256}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "FORMULA_UPDATE=true" >> $GITHUB_ENV
        else
          echo "FORMULA_UPDATE=false" >> $GITHUB_ENV
          echo "⚠️ Could not download from PyPI yet. Homebrew formula update skipped."
        fi

    - name: Update Homebrew formula
      if: env.FORMULA_UPDATE == 'true'
      run: |
        sed -i "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Formula/testmcpy.rb

    - name: Commit and push formula update
      if: env.FORMULA_UPDATE == 'true'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add Formula/testmcpy.rb
        git commit -m "Update Homebrew formula SHA256 for v${VERSION}" || echo "No changes to commit"
        git push origin HEAD:main || echo "No changes to push"
