services:
  testmcpy:
    build:
      context: .
      # Agentic tests (Claude Agent SDK provider) need two things:
      #   - the Python SDK package — INSTALLED BY DEFAULT here via
      #     pyproject.toml's `server` extra, so `import claude_agent_sdk`
      #     just works
      #   - the Claude Code CLI binary — opt-in via INSTALL_CLAUDE_CLI
      #     because it's heavy and only useful for in-container agent
      #     workflows. Without it, agentic tests fail with a clear
      #     CLINotFoundError from the SDK; other test types still run.
      #
      # Enable end-to-end agentic tests with:
      #   INSTALL_CLAUDE_CLI=true docker compose build
      # (or `up -d --build`). Optionally pin a specific Claude Code
      # version for reproducibility (install.sh otherwise tracks
      # `latest`):
      #   CLAUDE_CLI_VERSION=2.1.170 INSTALL_CLAUDE_CLI=true \
      #       docker compose build
      args:
        INSTALL_CLAUDE_CLI: ${INSTALL_CLAUDE_CLI:-false}
        CLAUDE_CLI_VERSION: ${CLAUDE_CLI_VERSION:-}
    image: testmcpy:latest
    ports:
      - "${PORT:-7100}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - testmcpy-data:/app/.testmcpy
      - ./mcp_services.yaml:/app/.mcp_services.yaml:ro
      - ./llm_providers.yaml:/app/.llm_providers.yaml:ro
    environment:
      - TESTMCPY_DB_PATH=/app/.testmcpy/storage.db
      - MCP_SERVER_URL=${MCP_SERVER_URL:-http://host.docker.internal:5100/api/mcp/}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

volumes:
  testmcpy-data:
